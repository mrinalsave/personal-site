<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>nintendo games</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="stylesheet" href="../../style.css">    <!-- root -->
    <link rel="stylesheet" href="../style.css">       <!-- nintendo-games -->
    <link rel="stylesheet" href="./style.css">        <!-- switch -->
</head>
<body>
    <div id="sidenav" class="sidenav"></div>
    <div id="nav-overlay"></div>

    <div id="main">
        <header style="position:fixed; top:20px; left:20px; right:20px; z-index:10; pointer-events:none;">
            <span id="open-nav" class="nintendo-text"
                  style="display:inline-block; width:fit-content; font-size:25px; cursor:pointer; pointer-events:auto;">
                &#9776; open
            </span>
            <div class="header">
                <h2 class="nintendo-text" style="text-align:center; font-size:35px">nintendo games</h2>
                <p class="retro-text" style="font-size: 12px; text-align: center">
                    <a href="../../devlog/2026/03/21/nintendo-games.html" target="_blank" style="pointer-events:auto;">wanna know how this was made ?</a>
                </p>
            </div>
        </header>

        <div id="home-screen">
            <div id="home-top-bar">
                <div id="home-top-bar-left">
                    <img id="avatar" src="./assets/images/avatar.png" alt="avatar">
                </div>

                <div id="home-top-bar-right">
                    <span id="current-time" class="switch-text"></span>
                    <img id="wifi-icon" src="./assets/images/wifi.png" alt="wifi">
                    <div id="battery-group">
                        <span id="current-battery" class="switch-text"></span>
                        <img id="battery-icon" src="./assets/images/battery.png" alt="battery">
                    </div>
                </div>
            </div>

            <div id="selected-title-wrapper">
                <span id="selected-title" class="switch-text"></span>
            </div>

            <div id="carousel-wrapper">
                <button id="arrow-left" class="carousel-arrow switch-text" aria-label="scroll left">&#8592;</button>
                <div id="carousel-track-outer">
                    <div id="carousel-track"></div>
                </div>
                <button id="arrow-right" class="carousel-arrow switch-text" aria-label="scroll right">&#8594;</button>
            </div>

            <img id="navigation-bar" src="./assets/images/navigation-bar.png" alt="switch navigation bar reference">

            <div id="home-bottom-bar">
                <img id="switch-icon" src="./assets/images/switch.png" alt="switch icon">

                <div id="home-bottom-bar-right">
                    <button id="back-btn" class="switch-text bottom-btn" tabindex="-1"
                            onclick="fadeTo('../index.html')">
                        <span class="btn-label">B</span> Back
                    </button>
                    <button id="ok-btn" class="switch-text bottom-btn" tabindex="-1">
                        <span class="btn-label">A</span> Start
                    </button>
                </div>
            </div>
        </div>

        <footer class="nintendo-text"
                style="position:fixed; bottom:0; left:0; right:0; text-align:center; font-size:20px; z-index:2; color:black; pointer-events:none;">
            <p>&copy; 2026 mrinal save / atsumr</p>
        </footer>
    </div>

    <div id="mobile-popup" class="mobile-popup">
        <div class="popup-header">
            <h4 class="retro-text popup-title">hey listen!</h4>
            <button id="close-popup" class="retro-text popup-close">OK</button>
        </div>
        <div class="popup-body">
            <p class="retro-text">
                this site is best experienced on desktop, so some functionality may be impacted on mobile.
                please check it out on desktop when you get the chance !
            </p>
        </div>
    </div>

    <script src="./script.js"        type="module"></script>
    <script src="../../mobile-popup.js" type="module"></script>
    <script src="../../side-nav.js"     type="module"></script>
</body>
</html>
