<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>nintendo games</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.ico">
    
    <link rel="stylesheet" href="../style.css"> <!-- root -->
    <link rel="stylesheet" href="./style.css"> <!-- nintendo-games -->
</head>
<body>
    <div id="sidenav" class="sidenav"></div>
    <div id="nav-overlay"></div>

    <div id="main">
        <header style="position:fixed; top:20px; left:20px; right:20px; z-index:10; pointer-events:none;">
            <span id="open-nav" class="nintendo-text"
                  style="display:inline-block; width:fit-content; font-size:25px; cursor:pointer; pointer-events:auto;">
                &#9776; open
            </span>
            <div class="header">
                <h2 class="nintendo-text" style="text-align:center; font-size:35px">nintendo games</h2>
                <p class="retro-text" style="font-size:12px; text-align:center">
                    <a href="../devlog/2026/03/21/nintendo-games.html" target="_blank" style="pointer-events:auto;">wanna know how this was made ?</a>
                </p>
            </div>
        </header>

        <div id="loading-screen">
            <p class="nintendo-text picker-label" style="font-size:20px">select console...</p>
            <div id="home-bottom-bar">
                <button id="switch-btn" class="nintendo-text bottom-btn" style="font-size:16px" tabindex="-1"
                        onclick="fadeTo('./switch/home.html')">
                    <span class="btn-label">X</span> Switch
                </button>
                <button id="ds-btn" class="nintendo-text bottom-btn" style="font-size:16px" tabindex="-1"
                        onclick="fadeTo('./3ds/home.html')">
                    <span class="btn-label">Y</span> 3DS
                </button>
            </div>
        </div>

        <footer class="nintendo-text"
                style="position:fixed; bottom:0; left:0; right:0; text-align:center; font-size:20px; z-index:2; color:black; pointer-events:none;">
            <p>&copy; 2026 mrinal save / atsumr</p>
        </footer>
    </div>

    <div id="mobile-popup" class="mobile-popup">
        <div class="popup-header">
            <h4 class="retro-text popup-title">hey listen!</h4>
            <button id="close-popup" class="retro-text popup-close">OK</button>
        </div>
        <div class="popup-body">
            <p class="retro-text">
                this site is best experienced on desktop, so some functionality may be impacted on mobile.
                please check it out on desktop when you get the chance !
            </p>
        </div>
    </div>

    <script src="./script.js" type="module"></script>
    <script src="../mobile-popup.js" type="module"></script>
    <script src="../side-nav.js" type="module"></script>
</body>
</html>
